# ================================================
# StallMart 本地开发环境
# ================================================
# 重要：禁止将任何服务暴露到公网！
# 所有服务仅通过 localhost 访问
# ================================================

services:

  # --------------------------------------------
  # MySQL 9.0 数据库
  # --------------------------------------------
  mysql:
    image: mysql:9.0
    container_name: stallmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      # 仅本地访问，不映射到 0.0.0.0
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    networks:
      - stallmart-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------
  # Redis 7.2 缓存
  # --------------------------------------------
  redis:
    image: redis:${REDIS_VERSION}
    container_name: stallmart-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      # 仅本地访问
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    networks:
      - stallmart-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------
  # Java 后端 API（开发模式）
  # --------------------------------------------
  api:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile.api
    container_name: stallmart-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${SERVER_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_VALIDITY: ${JWT_ACCESS_TOKEN_VALIDITY}
      JWT_REFRESH_TOKEN_VALIDITY: ${JWT_REFRESH_TOKEN_VALIDITY}
      # MySQL 连接（使用容器网络）
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # Redis 连接
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_REDIS_PORT: 6379
      STALLMART_CORS_ALLOWED_ORIGINS: ${STALLMART_CORS_ALLOWED_ORIGINS:-http://localhost:10086,http://127.0.0.1:10086}
    volumes:
      - gradle_cache:/root/.gradle
    ports:
      # 仅本地访问
      - "127.0.0.1:8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stallmart-network

  # --------------------------------------------
  # 管理端前端（Nuxt UI - 开发模式）
  # --------------------------------------------
  admin-web:
    build:
      context: ../web
      dockerfile: ../docker/Dockerfile.admin-web
    container_name: stallmart-admin-web
    restart: unless-stopped
    environment:
      NUXT_API_PROXY_TARGET: http://api:8080
    volumes:
      - node_modules_admin:/app/node_modules
    ports:
      # 仅本地访问，映射到 8091
      - "127.0.0.1:8091:3000"
    depends_on:
      - api
    networks:
      - stallmart-network

  # --------------------------------------------
  # App H5（Taro H5 - 开发调试模式）
  # --------------------------------------------
  app-h5:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile.app-h5
    container_name: stallmart-app-h5
    restart: unless-stopped
    environment:
      TARO_APP_ENABLE_API_MOCK: ${TARO_APP_ENABLE_API_MOCK:-false}
      TARO_APP_ID: ${TARO_APP_ID:-wx-stallmart-demo}
      TARO_APP_API_BASE_URL: ${TARO_APP_API_BASE_URL:-http://localhost:8081/api/v1}
      TARO_APP_H5_PORT: ${TARO_APP_H5_PORT:-10086}
    volumes:
      - ../app:/app
      - node_modules_app:/app/node_modules
    ports:
      # 仅本地访问，映射到 H5 调试端口
      - "127.0.0.1:10086:10086"
    depends_on:
      - api
    networks:
      - stallmart-network

volumes:
  mysql_data:
  redis_data:
  gradle_cache:
  node_modules_admin:
  node_modules_app:

networks:
  stallmart-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
