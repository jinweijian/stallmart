# ================================================
# StallMart 本地开发环境
# ================================================
# 重要：禁止将任何服务暴露到公网！
# 所有服务仅通过 localhost 访问
# ================================================

services:

  # --------------------------------------------
  # MySQL 9.0 数据库
  # --------------------------------------------
  mysql:
    image: mysql:9.0
    container_name: stallmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      # 仅本地访问，不映射到 0.0.0.0
      - "127.0.0.1:3306:3306"
    networks:
      - stallmart-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------
  # Redis 7.2 缓存
  # --------------------------------------------
  redis:
    image: redis:${REDIS_VERSION}
    container_name: stallmart-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      # 仅本地访问
      - "127.0.0.1:6379:6379"
    networks:
      - stallmart-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------
  # Java 后端 API（开发模式）
  # --------------------------------------------
  api:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile.api
    container_name: stallmart-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${SERVER_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_VALIDITY: ${JWT_ACCESS_TOKEN_VALIDITY}
      JWT_REFRESH_TOKEN_VALIDITY: ${JWT_REFRESH_TOKEN_VALIDITY}
      # MySQL 连接（使用容器网络）
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # Redis 连接
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_REDIS_PORT: 6379
    volumes:
      - ../server:/app
      - gradle_cache:/root/.gradle
    ports:
      # 仅本地访问
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stallmart-network

  # --------------------------------------------
  # 管理端前端（Nuxt UI - 开发模式）
  # --------------------------------------------
  admin-web:
    build:
      context: ../web
      dockerfile: ../docker/Dockerfile.admin-web
    container_name: stallmart-admin-web
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
    volumes:
      - ../web:/app
      - node_modules_admin:/app/node_modules
    ports:
      # 仅本地访问
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    networks:
      - stallmart-network

volumes:
  mysql_data:
  redis_data:
  gradle_cache:
  node_modules_admin:

networks:
  stallmart-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
