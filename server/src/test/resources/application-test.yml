server:
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:h2:mem:stallmart_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: stallmart-test-secret-key-which-is-long-enough-32
  access-token-validity: 7200
  refresh-token-validity: 604800
