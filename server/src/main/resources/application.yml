server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: stallmart-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stallmart?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:stallmart}
    password: ${SPRING_DATASOURCE_PASSWORD:stallmart}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

jwt:
  secret: ${JWT_SECRET:stallmart-local-development-secret-change-me-32chars}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:7200}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800}

stallmart:
  cors:
    allowed-origins: ${STALLMART_CORS_ALLOWED_ORIGINS:http://localhost:10086,http://127.0.0.1:10086}

management:
  endpoints:
    web:
      exposure:
        include: health
